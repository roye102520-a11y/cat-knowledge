# 免费线上可点击地址：https://你的用户名.github.io/仓库名/
# 首次使用：仓库 Settings → Pages → Build and deployment → Source 选 "GitHub Actions"
name: Deploy static site to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Base path for GitHub Pages (empty for username.github.io repo)
        id: basepath
        run: |
          NAME="${{ github.event.repository.name }}"
          if [[ "$NAME" == *.github.io ]]; then
            echo "path=" >> "$GITHUB_OUTPUT"
            echo "Using root path (user/org site)."
          else
            echo "path=/$NAME" >> "$GITHUB_OUTPUT"
            echo "Using project subpath /$NAME"
          fi

      - name: Static export
        env:
          STATIC_EXPORT: "1"
          BASE_PATH: ${{ steps.basepath.outputs.path }}
        run: npm run build:share

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
